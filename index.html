        // INITIALIZATION
        // ============================================================================
        async function init() {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (err) {
                console.error("Auth error:", err);
                state.authError = "System authentication failed. Please reload.";
            }

            onAuthStateChanged(auth, (user) => {
                state.appUser = user;
                state.loading = false;
                renderApp();
            });
        }

        // ============================================================================
        // GLOBAL FUNCTIONS (Bound to Window for HTML calls)
        // ============================================================================
        
        window.handleLogin = async (e) => {
            e.preventDefault();
            if (!state.appUser) return;
            
            const userInp = document.getElementById('usernameInput').value;
            const passInp = document.getElementById('passwordInput').value;
            
            if (!userInp || !passInp) {
                state.authError = 'Please enter both username and password.';
                renderApp();
                return;
            }

            state.loading = true;
            state.authError = '';
            renderApp();
            
            if (userInp.toLowerCase().trim() === 'teacher' && passInp === 'teacher123') {
                state.authRole = 'teacher';
                state.loading = false;
                startTeacherListener();
                renderApp();
                return;
            }

            try {
                const docId = userInp.toLowerCase().trim();
                const docRef = doc(db, 'learner_progress', docId); // Simplified path
                const docSnap = await getDoc(docRef);

                if (docSnap.exists()) {
                    const data = docSnap.data();
                    if (data.password === passInp) {
                        state.answers = data.answers || {};
                        state.studentUsername = docId;
                        state.authRole = 'student';
                    } else {
                        state.authError = 'Incorrect password for this username. Try again.';
                    }
                } else {
                    await setDoc(docRef, { password: passInp, answers: {}, lastUpdated: new Date().toISOString() });
                    state.answers = {};
                    state.studentUsername = docId;
                    state.authRole = 'student';
                }
            } catch (err) {
                state.authError = 'Failed to login. Please try again. ' + err.message;
            }
            
            state.loading = false;
            renderApp();
        };

        window.handleSaveProgress = async () => {
            if (!state.appUser || state.authRole !== 'student' || !state.studentUsername) return;
            
            state.saveStatus = { status: 'saving', message: 'Saving your progress...' };
            renderApp();
            
            try {
                const docRef = doc(db, 'learner_progress', state.studentUsername); // Simplified path
                await updateDoc(docRef, { answers: state.answers, lastUpdated: new Date().toISOString() });
                state.saveStatus = { status: 'success', message: 'Progress saved successfully!' };
                renderApp();
                
                setTimeout(() => {
                    state.saveStatus = { status: 'idle', message: '' };
                    renderApp();
                }, 3000);
            } catch (err) {
                state.saveStatus = { status: 'error', message: 'Failed to save. ' + err.message };
                renderApp();
                setTimeout(() => {
                    state.saveStatus = { status: 'idle', message: '' };
                    renderApp();
                }, 5000);
            }

            state.answers[qId] = value;

        // Full re-render for radio buttons (since they don't hold text focus)
        window.updateAnswerAndRender = (qId, value) => {
            state.answers[qId] = value;
            renderApp();
        };

        function startTeacherListener() {
            const progressRef = collection(db, 'learner_progress'); // Simplified path
            state.teacherUnsubscribe = onSnapshot(progressRef, (snapshot) => {
                const studentData = [];
                snapshot.forEach(doc => {
                    const data = doc.data();
                    const ansCount = data.answers ? Object.keys(data.answers).filter(k => data.answers[k].trim() !== '').length : 0;
                    studentData.push({
                        id: doc.id,
                        answers: data.answers || {},
                        answeredCount: ansCount,
                        lastUpdated: data.lastUpdated || null
                    });
                });
                state.students = studentData;
                
                // Update selected student if they are currently being viewed
                if (state.selectedStudent) {
                    state.selectedStudent = studentData.find(s => s.id === state.selectedStudent.id) || null;
                }
                
                if(state.authRole === 'teacher') renderApp();
            }, (error) => {
                console.error("Dashboard error:", error);
            });
        }

                        </div>
                    </div>`;
                return;
            }

            if (!state.authRole) {
                root.innerHTML = renderLoginScreen();
                return;
            }

            if (state.authRole === 'teacher') {
                root.innerHTML = renderTeacherDashboard();
                return;
            }

            root.innerHTML = renderStudentApp();
        }

        function renderLoginScreen() {
            let errorHtml = '';
            if (state.authError) {
                errorHtml = `
                    <div class="mb-6 p-3 bg-red-50 border border-red-200 text-red-700 text-sm rounded-lg flex items-start gap-2">
                        <i class="fas fa-exclamation-circle shrink-0 mt-0.5"></i>
                        <span>${state.authError}</span>
                    </div>`;
            }

            return `
            <div class="min-h-screen w-full flex items-center justify-center bg-slate-100 px-4">
                <div class="max-w-md w-full bg-white rounded-2xl shadow-xl overflow-hidden">
                    <div class="bg-blue-600 p-8 text-center text-white">
                        <i class="fas fa-book-open text-5xl mx-auto mb-4 opacity-90 block"></i>
                        <h1 class="text-2xl font-bold mb-2">Remediation Portal</h1>
                        <p class="text-blue-100 text-sm">Student & Teacher Access</p>
                    </div>
                    
                    <form onsubmit="window.handleLogin(event)" class="p-8" autocomplete="off">
                        ${errorHtml}
                        <div class="space-y-5">
                            <div>
                                <label class="block text-sm font-medium text-slate-700 mb-1">Username</label>
                                <div class="relative">
                                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
                                        <i class="fas fa-user"></i>
                                    </div>
                                    <input type="text" id="usernameInput" required autocomplete="off"
                                        class="w-full pl-10 pr-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all"
                                        placeholder="e.g. juandelacruz" />
                                </div>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-slate-700 mb-1">Password</label>
                                <div class="relative">
                                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
                                        <i class="fas fa-lock"></i>
                                    </div>
                                    <input type="password" id="passwordInput" required autocomplete="new-password"
                                        class="w-full pl-10 pr-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all"
                                        placeholder="Enter your PIN/Password" />
                                </div>
                            </div>
                        </div>
                        <div class="mt-8">
                            <button type="submit" class="w-full flex items-center justify-center gap-2 bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-lg font-medium shadow-md transition-all hover:shadow-lg active:scale-[0.98]">
                                Login / Enter <i class="fas fa-chevron-right text-sm"></i>
                            </button>
                        </div>
                        <div class="mt-6 text-xs text-center text-slate-500 border-t pt-4">
                            <p><strong>Students:</strong> Enter a username and password. If it is new, it will create your account slot instantly.</p>
                            <p class="mt-2 text-blue-600"><strong>Teachers:</strong> Use teacher account to view progress.</p>
                        </div>
                    </form>
                </div>
            </div>`;
        }

        function renderStudentApp() {
            let bannerHtml = '';
            if (state.saveStatus.status === 'error') {
                bannerHtml = `
                    <div class="bg-red-500 text-white text-sm px-4 py-2 flex items-center justify-center gap-2">
                        <i class="fas fa-exclamation-circle"></i> ${state.saveStatus.message}
                    </div>`;
            }

            let saveBtnClass = 'bg-blue-500 hover:bg-blue-400 text-white shadow-sm';
            let saveIcon = '<i class="fas fa-save"></i>';
            let saveText = 'Save Progress';

            if (state.saveStatus.status === 'saving') {
                saveBtnClass = 'bg-blue-600 text-blue-200 cursor-not-allowed';
                saveText = 'Saving...';
            } else if (state.saveStatus.status === 'success') {
                saveBtnClass = 'bg-green-500 hover:bg-green-600 text-white';
                saveIcon = '<i class="fas fa-check-circle"></i>';
                saveText = 'Saved!';
            }

            const activeData = WORKSHEET_DATA[state.activeTab];
            let tabsHtml = Object.keys(WORKSHEET_DATA).map(key => {
                const isActive = state.activeTab === key;
                const title = WORKSHEET_DATA[key].title.split(':')[0];
                return `<button onclick="window.setActiveTab('${key}')" class="whitespace-nowrap px-6 py-4 font-medium text-sm transition-colors border-b-2 ${isActive ? 'border-blue-600 text-blue-700' : 'border-transparent text-slate-500 hover:text-slate-700 hover:bg-slate-50'}">${title}</button>`;
            }).join('');

            let practicesHtml = activeData.practices.map((practice, index) => renderPracticeBlock(practice, state.answers, false)).join('');

            return `
            <!-- Header -->
            <header class="bg-blue-700 text-white shadow-md sticky top-0 z-50">
                <div class="max-w-6xl mx-auto px-4 py-4 flex flex-col sm:flex-row justify-between items-center gap-4">
                    <div>
                        <h1 class="text-xl font-bold flex items-center gap-2">
                            <i class="fas fa-book-open"></i> Numeracy Remediation Portal
                        </h1>
                        <p class="text-blue-200 text-sm mt-1">Student Account: <span class="font-semibold text-white">@${state.studentUsername}</span></p>
                    </div>
                    <div class="flex items-center gap-3 w-full sm:w-auto">
                        <button onclick="window.handleSaveProgress()" ${state.saveStatus.status === 'saving' ? 'disabled' : ''} 
                            class="flex-1 sm:flex-none flex items-center justify-center gap-2 px-4 py-2 rounded-lg font-medium transition-colors ${saveBtnClass}">
                            ${saveIcon} ${saveText}
                        </button>
                        <button onclick="window.handleLogout()" class="p-2 text-blue-200 hover:text-white hover:bg-blue-600 rounded-lg transition-colors" title="Logout">
                            <i class="fas fa-sign-out-alt text-lg"></i>
                        </button>
                    </div>
                </div>
                ${bannerHtml}
            </header>

            <!-- Tabs -->
            <div class="bg-white border-b shadow-sm">
                <div class="max-w-6xl mx-auto px-4 flex overflow-x-auto no-scrollbar">
                    ${tabsHtml}
                </div>
            </div>

            <!-- Main Content -->
            <main class="max-w-4xl mx-auto px-4 py-8 flex-1">
                <div class="mb-8">
                    <h2 class="text-2xl font-bold text-slate-800 border-b pb-4">${activeData.title}</h2>
                </div>
                <div class="space-y-12">
                    ${practicesHtml}
                </div>
                
                <div class="mt-12 p-6 bg-blue-50 border border-blue-100 rounded-xl text-center">
                    <h3 class="font-semibold text-blue-900 mb-2">Done for now?</h3>
                    <p class="text-blue-700 text-sm mb-4">Make sure to save your progress before leaving so you can continue later.</p>
                    <button onclick="window.handleSaveProgress()" class="inline-flex items-center gap-2 px-6 py-3 bg-blue-600 hover:bg-blue-700 text-white rounded-lg font-medium shadow-sm transition-colors">
                        <i class="fas fa-save"></i> Save My Progress
                    </button>
                </div>
            </main>
            `;
        }

        function renderTeacherDashboard() {
            let rosterHtml = '';
            if (state.students.length === 0) {
                rosterHtml = `<p class="text-center text-slate-500 p-4 mt-10">No students have saved data yet.</p>`;
            } else {
                rosterHtml = state.students.map(student => {
                    const completionPct = Math.round((student.answeredCount / TOTAL_QUESTIONS) * 100) || 0;
                    const isSelected = state.selectedStudent && state.selectedStudent.id === student.id;
                    const badgeClass = completionPct > 80 ? 'bg-green-100 text-green-700' : completionPct > 30 ? 'bg-yellow-100 text-yellow-700' : 'bg-slate-100 text-slate-600';
                    
                    return `
                    <button onclick="window.selectStudent('${student.id}')" class="w-full text-left p-4 rounded-lg border transition-all ${isSelected ? 'bg-indigo-50 border-indigo-300 shadow-sm' : 'hover:bg-slate-50 border-slate-200'}">
                        <div class="font-semibold text-slate-800 break-all">@${student.id}</div>
                        <div class="flex items-center justify-between mt-2">
                            <div class="text-xs text-slate-500">Progress: ${student.answeredCount}/${TOTAL_QUESTIONS}</div>
                            <div class="text-xs font-bold px-2 py-1 rounded-full ${badgeClass}">${completionPct}%</div>
                        </div>
                    </button>`;
                }).join('');
            }

            let mainAreaHtml = '';
            if (!state.selectedStudent) {
                mainAreaHtml = `
                    <div class="flex-1 flex flex-col items-center justify-center text-slate-400">
                        <i class="fas fa-users text-6xl mb-4 opacity-20"></i>
                        <p class="text-lg">Select a student from the roster to review their answers.</p>
                    </div>`;
            } else {
                const completionPct = Math.round((state.selectedStudent.answeredCount / TOTAL_QUESTIONS) * 100) || 0;
                const lastUpdatedStr = state.selectedStudent.lastUpdated ? new Date(state.selectedStudent.lastUpdated).toLocaleString() : 'N/A';
                
                let tabsHtml = Object.keys(WORKSHEET_DATA).map(key => {
                    const isActive = state.activeTab === key;
                    const title = WORKSHEET_DATA[key].title.split(':')[0];
                    return `<button onclick="window.setActiveTab('${key}')" class="whitespace-nowrap px-6 py-4 font-medium text-sm transition-colors border-b-2 ${isActive ? 'border-indigo-600 text-indigo-700' : 'border-transparent text-slate-500 hover:text-slate-700'}">${title}</button>`;
                }).join('');

                const activeData = WORKSHEET_DATA[state.activeTab];
                let practicesHtml = activeData.practices.map(practice => renderPracticeBlock(practice, state.selectedStudent.answers, true)).join('');

                mainAreaHtml = `
                    <!-- Review Header -->
                    <div class="bg-white p-4 border-b shrink-0 flex items-center justify-between shadow-sm">
                        <div class="flex items-center gap-4">
                            <button onclick="window.selectStudent(null)" class="md:hidden p-2 bg-slate-100 rounded-lg"><i class="fas fa-arrow-left"></i></button>
                            <div>
                                <h2 class="text-xl font-bold text-slate-800">Reviewing: @${state.selectedStudent.id}</h2>
                                <p class="text-sm text-slate-500">
                                    Overall Completion: <span class="font-semibold">${completionPct}%</span> • Last saved: ${lastUpdatedStr}
                                </p>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Review Tabs -->
                    <div class="bg-white border-b shrink-0 px-4 flex overflow-x-auto no-scrollbar">
                        ${tabsHtml}
                    </div>

                    <!-- Review Content -->
                    <div class="flex-1 overflow-y-auto p-4 md:p-8">
                        <div class="max-w-4xl mx-auto space-y-8">
                            <h3 class="text-2xl font-bold text-indigo-900 border-b pb-2 mb-6">${activeData.title}</h3>
                            <div class="space-y-12">
                                ${practicesHtml}
                            </div>
                        </div>
                    </div>
                `;
            }

            return `
            <div class="min-h-screen flex flex-col w-full h-full">
                <!-- Teacher Header -->
                <header class="bg-indigo-800 text-white shadow-md z-50 shrink-0">
                    <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
                        <h1 class="text-xl font-bold flex items-center gap-2">
                            <i class="fas fa-chalkboard-teacher"></i> Teacher Control Panel
                        </h1>
                        <button onclick="window.handleLogout()" class="flex items-center gap-2 px-4 py-2 bg-indigo-700 hover:bg-indigo-600 rounded-lg transition-colors">
                            <i class="fas fa-sign-out-alt"></i> Logout
                        </button>
                    </div>
                </header>

                <!-- Main Content Split -->
                <div class="flex-1 flex overflow-hidden">
                    <!-- Sidebar -->
                    <div class="w-full md:w-1/3 lg:w-1/4 bg-white border-r flex flex-col ${state.selectedStudent ? 'hidden md:flex' : 'flex'}">
                        <div class="p-4 bg-slate-50 border-b flex justify-between items-center shrink-0">
                            <h2 class="font-semibold flex items-center gap-2 text-slate-700"><i class="fas fa-users"></i> Class Roster (${state.students.length})</h2>
                        </div>
                        <div class="flex-1 overflow-y-auto p-2 space-y-2">
                            ${rosterHtml}
                        </div>
                    </div>

                    <!-- Main Area -->
                    <div class="flex-1 flex flex-col bg-slate-50 ${!state.selectedStudent ? 'hidden md:flex' : 'flex'}">
                        ${mainAreaHtml}
                    </div>
                </div>
            </div>
            `;
        }

        function renderPracticeBlock(practice, answersObj, readOnly) {
            let partsHtml = practice.parts.map(part => renderPartBlock(part, answersObj, readOnly)).join('');
            
            return `
            <div class="mb-4">
                <h3 class="text-2xl font-bold text-slate-800 mb-4">${practice.title}</h3>
                <div class="bg-blue-50 border-l-4 border-blue-500 p-4 rounded-r-lg mb-6 shadow-sm">
                    <h4 class="font-semibold text-blue-900 mb-1">General Instruction:</h4>
                    <p class="text-blue-800 text-sm leading-relaxed">${practice.generalInstruction}</p>
                </div>
                <div class="space-y-6">
                    ${partsHtml}
                </div>
            </div>`;
        }

        function renderPartBlock(part, answersObj, readOnly) {
            let answeredCount = 0;
            part.questions.forEach((_, i) => {
                const val = answersObj[`${part.id}_q${i}`];
                if (val && val.trim() !== '') answeredCount++;
            });

            const badgeHtml = readOnly ? `<span class="text-xs px-2 py-1 rounded-full font-medium ${answeredCount === part.questions.length ? 'bg-green-100 text-green-700' : 'bg-amber-100 text-amber-700'}">${answeredCount}/${part.questions.length} answered</span>` : '';

            let hintsHtml = '';
            if (part.hints) {
                let lis = part.hints.map(h => `<li>${h}</li>`).join('');
                hintsHtml = `
                    <div class="mb-6 p-4 bg-amber-50 border border-amber-200 rounded-lg text-sm text-amber-800">
                        <strong class="block mb-2">Hints:</strong>
                        <ul class="list-disc pl-5 space-y-1">${lis}</ul>
                    </div>`;
            }

            let choicesHtml = '';
            if (part.type === 'matching' && part.choices) {
                let items = part.choices.map(c => `
                    <div class="flex gap-3 text-slate-700">
                        <span class="font-bold text-blue-700 w-5">${c.letter}.</span>
                        <span>${c.text}</span>
                    </div>`).join('');
                choicesHtml = `
                    <div class="mb-8 p-6 bg-slate-50 rounded-xl border border-slate-200 shadow-sm">
                        <h4 class="font-bold text-slate-800 mb-4 border-b border-slate-200 pb-2">Column B (Choices)</h4>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-x-6 gap-y-3">${items}</div>
                    </div>`;
            }

            let questionsHtml = part.questions.map((q, index) => {
                const qId = `${part.id}_q${index}`;
                const value = answersObj[qId] || '';
                
                let inputHtml = '';
                
                if (part.type === 'matching') {
                    // text input handling (silent update to keep focus)
                    const onInputAttr = readOnly ? '' : `oninput="window.updateAnswerSilent('${qId}', this.value.toLowerCase())"`;
                    const inputClasses = readOnly ? 'bg-slate-50 text-indigo-900 border-indigo-200' : 'border-slate-300 shadow-sm bg-white';
                    
                    inputHtml = `
                        <div class="flex items-center gap-4">
                            <input type="text" maxlength="1" value="${value}" ${readOnly ? 'disabled' : ''} ${onInputAttr}
                                class="w-14 text-center p-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition-all font-bold uppercase text-lg ${inputClasses}"
                                placeholder="${readOnly ? '' : '?'}" />
                            <p class="font-semibold text-slate-800 text-lg">${q}</p>
                        </div>`;
                } else if (part.type === 'tf') {
                    // radio buttons (triggers full render on change)
                    const onChangeT = readOnly ? '' : `onchange="window.updateAnswerAndRender('${qId}', 'T')"`;
                    const onChangeF = readOnly ? '' : `onchange="window.updateAnswerAndRender('${qId}', 'F')"`;
                    
                    const labelBaseClass = "flex items-center gap-2 p-3 border rounded-lg transition-all cursor-pointer";
                    const classT = readOnly ? (value === 'T' ? 'bg-indigo-50 border-indigo-300' : 'opacity-50') : (value === 'T' ? 'bg-blue-50 border-blue-500 shadow-sm' : 'hover:bg-slate-50 border-slate-200');
                    const classF = readOnly ? (value === 'F' ? 'bg-indigo-50 border-indigo-300' : 'opacity-50') : (value === 'F' ? 'bg-blue-50 border-blue-500 shadow-sm' : 'hover:bg-slate-50 border-slate-200');
                    
                    inputHtml = `
                        <p class="font-medium text-slate-800 mb-3">${q}</p>
                        <div class="flex gap-4">
                            <label class="${labelBaseClass} ${classT}">
                                <input type="radio" name="${qId}" value="T" ${value === 'T' ? 'checked' : ''} ${readOnly ? 'disabled' : ''} ${onChangeT} class="w-4 h-4 text-blue-600" />
                                <span class="font-semibold text-slate-700">T - True</span>
                            </label>
                            <label class="${labelBaseClass} ${classF}">
                                <input type="radio" name="${qId}" value="F" ${value === 'F' ? 'checked' : ''} ${readOnly ? 'disabled' : ''} ${onChangeF} class="w-4 h-4 text-blue-600" />
                                <span class="font-semibold text-slate-700">F - False</span>
                            </label>
                        </div>`;
                } else if (part.type === 'textarea') {
                    const onInputAttr = readOnly ? '' : `oninput="window.updateAnswerSilent('${qId}', this.value)"`;
                    const inputClasses = readOnly ? 'bg-slate-50 text-indigo-900 border-indigo-200 font-medium' : 'border-slate-300 shadow-sm bg-white';
                    
                    inputHtml = `
                        <p class="font-medium text-slate-800 mb-3">${q}</p>
                        <textarea rows="3" ${readOnly ? 'disabled' : ''} ${onInputAttr}
                            class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition-all ${inputClasses}"
                            placeholder="${readOnly ? (value ? '' : 'No answer provided') : 'Explain your answer here...'}">${value}</textarea>`;
                } else {
                    const onInputAttr = readOnly ? '' : `oninput="window.updateAnswerSilent('${qId}', this.value)"`;
                    const inputClasses = readOnly ? 'bg-slate-50 text-indigo-900 border-indigo-200 font-medium' : 'border-slate-300 shadow-sm bg-white';
                    
                    inputHtml = `
                        <p class="font-medium text-slate-800 mb-3">${q}</p>
                        <input type="text" value="${value}" ${readOnly ? 'disabled' : ''} ${onInputAttr}
                            class="w-full md:w-2/3 p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition-all ${inputClasses}"
                            placeholder="${readOnly ? (value ? '' : 'No answer provided') : 'Type your answer here...'}" />`;
                }

                return `<div class="pb-4 border-b border-slate-100 last:border-0 last:pb-0">${inputHtml}</div>`;
            }).join('');

            // Wrapping the block in a <details> element acting as a native accordion
            const wrapperClass = readOnly ? 'border-indigo-100' : 'border-slate-200';
            const headerClass = readOnly ? 'bg-indigo-50/50 hover:bg-indigo-50 border-indigo-100' : 'bg-slate-50 hover:bg-slate-100 border-slate-200';
            
            return `
            <details open class="bg-white rounded-xl shadow-sm border overflow-hidden ${wrapperClass} group mb-6">
                <summary class="w-full px-6 py-4 border-b flex justify-between items-center transition-colors cursor-pointer outline-none ${headerClass}">
                    <div class="flex items-center gap-3">
                        <h3 class="font-semibold text-lg text-slate-800 text-left">${part.title}</h3>
                        ${badgeHtml}
                    </div>
                    <i class="fas fa-chevron-down text-slate-400 transition-transform group-open:rotate-180"></i>
                </summary>
                <div class="p-6">
                    <div class="mb-4 text-slate-700 text-sm">
                        <strong>Instruction:</strong> ${part.instruction}
                    </div>
                    ${hintsHtml}
                    ${choicesHtml}
                    <div class="space-y-6">
                        ${questionsHtml}
                    </div>
                </div>
            </details>`;
        }

        // Run Init
        init();

    </script>
</body>
</html>
